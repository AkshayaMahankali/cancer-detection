<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Smart Diagnosis</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-white to-green-100 flex items-center justify-center h-screen">

  <div class="bg-white shadow-xl rounded-2xl p-10 text-center w-full max-w-md">

    <h1 class="text-3xl font-bold mb-6 text-gray-800">
      Admin Login
    </h1>

    {% if error %}
      <p class="text-red-600 mb-4 font-medium">{{ error }}</p>
    {% endif %}

    <form action="/admin_login" method="post" class="space-y-5">

      <div>
        <label class="block text-gray-700 font-medium">Username</label>
        <input type="text" name="username" required
               class="w-full border rounded-lg px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-gray-700 font-medium">Password</label>
        <input type="password" name="password" required
               class="w-full border rounded-lg px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <button type="submit"
                class="bg-blue-600 text-white px-8 py-2 rounded-full hover:bg-blue-700 transition">
          Login
        </button>
      </div>

    </form>

    <p class="mt-6 text-gray-500 text-sm">
      Back to <a href="/" class="text-blue-600 hover:underline">Home</a>
    </p>

  </div>

</body>
</html>
